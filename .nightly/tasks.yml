# =============================================================================
# .nightly/tasks.yml — 日中試運転用(疎通確認のための最小構成)
# -----------------------------------------------------------------------------
# 目的: パイプラインの疎通確認のみ。成果物の価値は問わない。
# 想定所要時間: Jules起動〜PR作成まで15〜30分程度(APIの応答次第)
#
# 確認したいこと(SETUP_GUIDE.md 手順5の到達目標):
#   1. push トリガーで nightly-turn-switch が起動する
#   2. 統合ブランチ integration/nightly-YYYYMMDD が作成される
#   3. Jules API 呼び出しが成功しセッションが起動する
#   4. Jules が統合ブランチ宛てに [T1-01] タイトルのPRを作成する
#   5. PR作者のログイン名を確認する ← JULES_BOT_LOGINS 設定のため最重要
#   6. auto-merge-to-integration が起動し、ゲート判定が動作する
# =============================================================================

night: 2026-07-13          # ★試運転当日のJST日付。日をまたぐ場合は書き換える

# 試運転時点ではテスト基盤未整備のため空でよい(既存テストが無ければ改変検査も発火しない)
test_paths: []

# .github/ .nightly/ AGENTS.md は常時保護のため記載不要
protected_paths: []

# --- 第1ターン: 疎通確認用の1タスクのみ -------------------------------------
turn1:
  - id: T1-01
    title: "パイプライン疎通確認: READMEに1行追記"
    risk: low
    paths:
      - "README.md"                   # 存在しない場合は新規作成される想定
    prompt: |
      ## 目的(Why)
      本タスクは深夜バッチパイプラインの日中疎通確認である。
      成果物の価値は問わないため、指示された変更のみを最小限に実施すること。

      ## 変更内容(What)
      リポジトリルートの README.md に、以下の1行を追記する。
      - 追記内容: `<!-- nightly pipeline: dry-run OK (T1-01) -->`
      - 追記位置: ファイル末尾(最終行の後ろに改行1つを空けて追記)
      - README.md が存在しない場合は、上記1行のみを内容とする README.md を新規作成する

      ## 完了条件
      - [ ] README.md の末尾に上記コメント行が1行だけ追記されている
      - [ ] README.md 以外のファイルを一切変更していない
      - [ ] 空白・改行整形など「ついで」の変更を一切していない

      ## やらないこと
      - README.md 内の既存文言の修正・整形・翻訳
      - 他ファイルへの追加・削除・リネーム
      - 新規依存パッケージの追加

      ## 補足(重要)
      本タスクはパイプラインの疎通確認である。指示に曖昧さや矛盾を感じた場合、
      推測で埋めずにPR説明文の「未確定事項」に記載して提出すること。

# --- 第2ターン: 空 ---------------------------------------------------------
# 試運転ではターン切替のcronは動かさない(手動キック時のみ確認)。空でも問題ない。
turn2: []
