# =============================================================================
# .nightly/tasks.yml — 3夜目(2026-07-17)
# -----------------------------------------------------------------------------
# 目的: UI 化フェーズの3夜目。GET /tasks(2夜目)に続き、書き込み系の
#       PUT /tasks(turn1)と、/health・GET・PUT を通す smoke test(turn2)を
#       積む。プロンプトは分量が増えたため外部ファイル(prompt_file)に分離。
#
# 注記(スキーマ): 本パイプラインの正本スキーマは night / turn1 / turn2 で
#   あり、統合ブランチ名は night から導出される(integration_branch キーは
#   存在しない)。各タスクには書き込み許可 paths が必須。
#
# 実行方法(日中テストの場合):
#   $env:NIGHTLY_FORCE_DATE = "2026-07-17"
#   $env:PYTHONIOENCODING   = "utf-8"
#   python .nightly\scripts\nightly.py start-night
#   # 夜間本番の場合は NIGHTLY_FORCE_DATE 不要
# =============================================================================
night: 2026-07-17
test_paths:
  - "tests/**"
protected_paths:
  - ".nightly/**"
  - ".github/**"
  - "AGENTS.md"
  - "SETUP_GUIDE.md"

turn1:
  - id: T1-01
    title: "PUT /tasks エンドポイント追加"
    risk: low
    paths:
      - "webui/app.py"
    prompt_file: ".nightly/prompts/night3-t1.md"

turn2:
  - id: T2-01
    title: "smoke test（/health, GET /tasks, PUT /tasks）"
    risk: low
    depends_on: ["T1-01"]
    paths:
      - "tests/**"
      - "webui/app.py"
      - "pyproject.toml"
    prompt_file: ".nightly/prompts/night3-t2.md"
