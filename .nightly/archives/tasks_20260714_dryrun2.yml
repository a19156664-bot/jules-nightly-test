# =============================================================================
# .nightly/tasks.yml — 日中試運転第2弾用(automationMode 自動化の実地検証)
# -----------------------------------------------------------------------------
# 目的: Publish PR 自動化(automationMode=AUTO_CREATE_PR)の実挙動を確認する。
#       昨日の試運転第1弾では Jules セッションが「Ready for review」で止まったが、
#       今回は Jules が自動的に PR を作成することを検証する。
# =============================================================================
night: 2026-07-14
test_paths: []
protected_paths: []
turn1:
  - id: T1-01
    title: "試運転第2弾: automationMode 自動PR作成の検証"
    risk: low
    paths:
      - "README.md"
    prompt: |
      ## 目的(Why)
      本タスクは深夜バッチパイプラインの日中試運転第2弾である。
      昨日のパイプライン実装で追加した automationMode: AUTO_CREATE_PR の実挙動を
      確認することが目的である。成果物の価値は問わない。

      ## 変更内容(What)
      リポジトリルートの README.md に、以下の1行を追記する。
      - 追記内容: `<!-- nightly pipeline: dry-run 2nd OK (T1-01, auto-PR) -->`
      - 追記位置: ファイル末尾(既存の最終行の後ろに改行1つを空けて追記)
      - README.md が存在しない場合は、上記1行のみを内容とする README.md を新規作成する

      ## 完了条件
      - [ ] README.md の末尾に上記コメント行が1行だけ追記されている
      - [ ] README.md 以外のファイルを一切変更していない
      - [ ] 空白・改行整形など「ついで」の変更を一切していない

      ## やらないこと
      - README.md 内の既存文言の修正・整形・翻訳
      - 他ファイルへの追加・削除・リネーム
      - 新規依存パッケージの追加

      ## 補足(重要)
      本タスクはパイプラインの疎通確認である。指示に曖昧さや矛盾を感じた場合、
      推測で埋めずにPR説明文の「未確定事項」に記載して提出すること。
turn2: []
