<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Loop Dashboard</title>
<style>
  :root {
    --bg: #0e0e10;
    --surface-1: #1a1a1e;
    --surface-2: #222228;
    --border: #2e2e34;
    --text: #e4e4e7;
    --text-secondary: #a0a0a8;
    --text-muted: #6b6b74;
    --green: #22c55e;
    --green-bg: rgba(34,197,94,0.12);
    --yellow: #eab308;
    --yellow-bg: rgba(234,179,8,0.12);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,0.12);
    --accent: #6366f1;
    --accent-bg: rgba(99,102,241,0.12);
    --mono: "SF Mono", "Cascadia Code", "Fira Code", monospace;
    --sans: "Inter", -apple-system, "Segoe UI", sans-serif;
    --radius: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    padding: 24px;
    max-width: 820px;
    margin: 0 auto;
    line-height: 1.5;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .signal-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .signal-dot.green { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .signal-dot.yellow { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); }
  .signal-dot.red { background: var(--red); box-shadow: 0 0 8px var(--red); }
  .signal-label { font-size: 17px; font-weight: 500; }
  .signal-detail { font-size: 13px; color: var(--text-muted); margin-left: 4px; }
  .updated { font-size: 12px; color: var(--text-muted); }

  /* ── Metric cards ── */
  .metrics {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }
  .card {
    background: var(--surface-1);
    border-radius: var(--radius);
    padding: 16px;
  }
  .card-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
  .card-value { font-size: 22px; font-weight: 500; }
  .card-value .denom { font-size: 14px; color: var(--text-muted); }
  .bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 8px; }
  .bar-fill { height: 4px; border-radius: 2px; background: var(--accent); transition: width 0.4s; }

  /* ── Sections ── */
  .section {
    background: var(--surface-2);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 12px;
  }
  .section-title {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-icon { font-size: 15px; }

  /* ── Task / PR rows ── */
  .row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
  }
  .row + .row { border-top: 0.5px solid var(--border); }
  .tag {
    font-family: var(--mono);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 6px;
    flex-shrink: 0;
  }
  .tag-task { background: var(--accent-bg); color: var(--accent); }
  .tag-pr { font-size: 12px; color: var(--text-muted); font-family: var(--mono); }
  .row-title { font-size: 14px; flex: 1; }
  .row-meta { font-size: 12px; color: var(--text-muted); flex-shrink: 0; }
  .badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 6px;
    flex-shrink: 0;
  }
  .badge-merged { background: var(--green-bg); color: var(--green); }
  .badge-open { background: var(--yellow-bg); color: var(--yellow); }
  .badge-ok { background: var(--green-bg); color: var(--green); }

  /* ── Footer ── */
  .footer {
    background: var(--surface-1);
    border-radius: var(--radius);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 4px;
  }
  .footer-icon { font-size: 16px; color: var(--text-secondary); }
  .footer-text { font-size: 13px; color: var(--text-secondary); }
  .footer-mono { font-size: 11px; font-family: var(--mono); color: var(--text-muted); margin-top: 2px; }

  /* ── Loading / Error ── */
  .error-banner {
    background: var(--red-bg);
    color: var(--red);
    padding: 10px 16px;
    border-radius: var(--radius);
    font-size: 13px;
    margin-bottom: 12px;
    display: none;
  }
  .loading { color: var(--text-muted); font-size: 13px; font-style: italic; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <span class="signal-dot green" id="signalDot"></span>
    <span class="signal-label" id="signalLabel">Loading...</span>
    <span class="signal-detail" id="signalDetail"></span>
  </div>
  <span class="updated" id="updatedAt"></span>
</div>

<div class="error-banner" id="errorBanner"></div>

<!-- Metrics -->
<div class="metrics">
  <div class="card">
    <div class="card-label">Target Night</div>
    <div class="card-value" id="metricNight">--</div>
  </div>
  <div class="card">
    <div class="card-label">LLM Calls (day)</div>
    <div class="card-value"><span id="metricLlmDay">-</span> <span class="denom">/ <span id="metricLlmDayMax">24</span></span></div>
    <div class="bar"><div class="bar-fill" id="barLlmDay" style="width:0%"></div></div>
  </div>
  <div class="card">
    <div class="card-label">5h Window</div>
    <div class="card-value"><span id="metricLlmWin">-</span> <span class="denom">/ <span id="metricLlmWinMax">8</span></span></div>
    <div class="bar"><div class="bar-fill" id="barLlmWin" style="width:0%"></div></div>
  </div>
  <div class="card">
    <div class="card-label">Pending</div>
    <div class="card-value" id="metricPending">--</div>
  </div>
</div>

<!-- Tasks -->
<div class="section">
  <div class="section-title"><span class="section-icon">&#9789;</span> Tonight's Tasks</div>
  <div id="tasksList"><span class="loading">Loading tasks...</span></div>
</div>

<!-- State details -->
<div class="section">
  <div class="section-title"><span class="section-icon">&#9881;</span> State Details</div>
  <div id="stateDetails"><span class="loading">Loading state...</span></div>
</div>

<!-- Footer -->
<div class="footer">
  <span class="footer-icon">&#60;/&#62;</span>
  <div>
    <div class="footer-text">Machine-readable view &mdash; same data source as the commander LLM</div>
    <div class="footer-mono">GET /api/state | /api/budget | /api/signal</div>
  </div>
</div>

<script>
const SIGNAL_LABELS = {
  green: "Normal Operation",
  yellow: "Pending Action",
  red: "Stopped"
};
const SIGNAL_JP = {
  green: "正常運転中",
  yellow: "承認待ち",
  red: "停止中"
};

function setSignal(sig, reason) {
  const dot = document.getElementById("signalDot");
  const label = document.getElementById("signalLabel");
  const detail = document.getElementById("signalDetail");
  dot.className = "signal-dot " + sig;
  label.textContent = SIGNAL_JP[sig] || sig;
  detail.textContent = reason || "";
}

function setError(msg) {
  const banner = document.getElementById("errorBanner");
  if (msg) {
    banner.textContent = msg;
    banner.style.display = "block";
  } else {
    banner.style.display = "none";
  }
}

function pct(n, d) { return d > 0 ? Math.min(100, Math.round(n / d * 100)) : 0; }

function updateTime() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2, "0");
  const mm = String(now.getMinutes()).padStart(2, "0");
  document.getElementById("updatedAt").textContent = "Updated " + hh + ":" + mm;
}

async function fetchJSON(url) {
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(url + " -> " + resp.status);
  return resp.json();
}

async function refresh() {
  try {
    const [state, signal] = await Promise.all([
      fetchJSON("/api/state"),
      fetchJSON("/api/signal"),
    ]);
    setError(null);

    // Signal
    setSignal(signal.signal, signal.reason);

    // Metrics
    const b = state.budget || {};
    document.getElementById("metricNight").textContent = state.current_night || "--";
    document.getElementById("metricLlmDay").textContent = b.llm_calls_today ?? "-";
    document.getElementById("metricLlmDayMax").textContent = b.max_llm_calls_per_day ?? 24;
    document.getElementById("barLlmDay").style.width = pct(b.llm_calls_today, b.max_llm_calls_per_day) + "%";
    const winCount = Array.isArray(b.llm_calls_window) ? b.llm_calls_window.length : 0;
    document.getElementById("metricLlmWin").textContent = winCount;
    document.getElementById("metricLlmWinMax").textContent = b.max_llm_calls_per_window ?? 8;
    document.getElementById("barLlmWin").style.width = pct(winCount, b.max_llm_calls_per_window) + "%";

    // Pending count
    const pr = (state.pending_reviews || []).length;
    const pt = (state.pending_tasks || []).length;
    const total = pr + pt;
    const pendingEl = document.getElementById("metricPending");
    pendingEl.textContent = total + " items";
    pendingEl.style.color = total > 0 ? "var(--yellow)" : "var(--green)";

    // State details
    const detailsEl = document.getElementById("stateDetails");
    detailsEl.innerHTML = "";
    const fields = [
      ["Phase", state.phase],
      ["Turn", state.turn],
      ["Loop Status", state.loop_status],
      ["Error Count", state.error_count],
      ["Wakeups Today", b.wakeups_today],
      ["Stop Reason", state.stop_reason || "none"],
    ];
    fields.forEach(([k, v]) => {
      const row = document.createElement("div");
      row.className = "row";
      row.innerHTML = '<span class="row-title" style="color:var(--text-secondary)">' + k + '</span>'
        + '<span class="row-meta" style="color:var(--text)">' + v + '</span>';
      detailsEl.appendChild(row);
    });

    updateTime();
  } catch (err) {
    setError("Failed to fetch: " + err.message);
    setSignal("red", "API unreachable");
  }

  // Tasks (separate try, independent of state)
  try {
    const tasks = await fetchJSON("/tasks");
    const container = document.getElementById("tasksList");
    container.innerHTML = "";
    const allTasks = [
      ...(tasks.turn1 || []).map(t => ({...t, turn: "T1"})),
      ...(tasks.turn2 || []).map(t => ({...t, turn: "T2"})),
    ];
    if (allTasks.length === 0) {
      container.innerHTML = '<span class="loading">No tasks configured</span>';
    }
    allTasks.forEach(t => {
      const row = document.createElement("div");
      row.className = "row";
      row.innerHTML = '<span class="tag tag-task">' + t.id + '</span>'
        + '<span class="row-title">' + t.title + '</span>'
        + '<span class="row-meta">' + (t.turn === "T1" ? "21:00 start" : "after T1 merge") + '</span>';
      container.appendChild(row);
    });
  } catch (err) {
    document.getElementById("tasksList").innerHTML = '<span class="loading">Tasks unavailable</span>';
  }
}

// Initial load + 30s polling
refresh();
setInterval(refresh, 30000);
</script>
</body>
</html>
