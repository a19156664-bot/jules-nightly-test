# =============================================================================
# morning-report.yml — 朝レポート生成(トークン消費ゼロの機械プリフィルタ)
# -----------------------------------------------------------------------------
# 05:45 JST に全PRのステータスを機械集計し、以下を出力する:
#   - タスク × PR × CI結果 × ゲート違反 × 推奨仕分けの一覧表
#   - 出力先: 統合ブランチの .nightly/reports/ + Actions の Step Summary
# この表で「CI不合格→要修正」「違反あり→要人間確認」が確定するため、
# Fable 5 の一括レビューには残りの候補だけを渡せばよい(トークン節約の第0段)。
# =============================================================================
name: nightly-morning-report

on:
  schedule:
    # 20:45 UTC = 05:45 JST(翌朝)
    - cron: "45 20 * * *"
  workflow_dispatch: {}   # 任意のタイミングで再生成可能(リカバリ用)

permissions:
  contents: write        # レポートを統合ブランチへコミット
  pull-requests: read

concurrency:
  group: nightly-morning-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      JULES_BOT_LOGINS: ${{ vars.JULES_BOT_LOGINS }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install PyYAML
        run: pip install --quiet pyyaml

      - name: Generate morning report
        run: python3 .nightly/scripts/nightly.py report
