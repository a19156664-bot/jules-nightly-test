# =============================================================================
# .nightly/tasks.yml — 深夜バッチのタスクマニフェスト(夜の設計図)
# -----------------------------------------------------------------------------
# 使い方: 就寝前に人間+建築家(Fable 5)でこのファイルを編集し、main にコミット
#         するだけで夜間バッチが始動する(turn-switch.yml が push を検知)。
#
# ルール(nightly.py validate が機械検証する):
#   - night: 今夜の日付(夕方の日付)。過去日付のまま再コミットしても誤発火しない
#   - タスクIDは T1-01 / T2-01 形式で一意
#   - 同一ターン内のタスクの paths は互いに素(1ファイル=1オーナー)
#   - depends_on は T2 のタスクのみ持てる。依存先は T1 のIDのみ(1ホップ制限)
#   - .github/ .nightly/ AGENTS.md 配下への書き込み宣言は禁止(常時保護)
#
# 仕分けの4基準(配置前に自問すること):
#   1. 夜間適格性: 「最悪の実装でも翌朝ブランチごと捨てれば無傷か?」Noなら日中へ
#   2. ファイル所有権: 共有ファイルに触るタスクは各ターン1件まで
#   3. 依存方向: T1=生産者(型・共通基盤・スキーマ) / T2=消費者(それを使う実装)
#   4. 不確実なタスクはT1へ前倒し(翌朝の判断材料を最大化)
# =============================================================================

night: 2026-07-14          # ★毎晩書き換える(YYYY-MM-DD、今夜=夕方の日付)

# --- 全タスク共通の設定 -------------------------------------------------------
# テストとみなすパス(この配下は「追加」のみ許可。変更・削除・リネームは自動ブロック)
test_paths:
  - "tests/**"
  # - "**/*_test.py"
  # - "**/*.test.ts"

# 追加の保護パス(.github/ .nightly/ AGENTS.md は常時保護のため記載不要)
protected_paths:
  - "config/production/**"
  # - "migrations/**"

# --- 第1ターン(23:30〜02:30 目安): 土台・生産者タスク -------------------------
turn1:
  # 【初夜の推奨タスク】テスト未導入プロジェクトはまずこれを1件だけ走らせる
  - id: T1-01
    title: "テスト基盤の構築と .nightly/ci.sh の実体化…ではなく tests/ 配下の整備"
    risk: low
    paths:
      - "tests/**"
      - "requirements-dev.txt"        # ★プロジェクトに合わせて変更
    prompt: |
      ## 目的(Why)
      本プロジェクトには自動テストが存在しない。今後の夜間自動化の品質ゲートとして
      機能する最小限のテスト基盤を構築したい。
      ## 変更内容(What)
      1. テストフレームワークの設定と、tests/ 配下のディレクトリ構成を作成する
      2. 主要モジュールに対するスモークテスト(import可能・主要関数が例外なく動く)を
         5〜10件作成する
      3. テストの実行方法を tests/README.md に記載する
      ## 完了条件
      - [ ] テスト一式がローカル実行手順どおりに全件パスする
      - [ ] テストは外部サービス・本番データに依存しない
      ## やらないこと
      - 既存実装コードの変更(テスト可能にするためのリファクタも今回は禁止。
        必要なら未確定事項として報告のみ)

  - id: T1-02
    title: "(例)共通バリデーションユーティリティの追加"
    risk: low
    paths:
      - "src/lib/validation/**"       # ★互いに素なパスを宣言する
    prompt_file: .nightly/prompts/T1-02.md   # 長い指示は別ファイルに切り出せる

# --- 第2ターン(02:30〜05:30 目安): 応用・消費者タスク -------------------------
# 注意: T2の計画(Plan)は誰も見ずに自動承認へ進む。リスクの低いタスクだけを置くこと
turn2:
  - id: T2-01
    title: "(例)T1-02のバリデーションを注文APIに適用"
    risk: low
    depends_on: [T1-02]               # 依存先が統合ブランチにマージ済みの場合のみ投入される
    paths:
      - "src/api/orders/**"
    prompt: |
      ## 目的(Why)
      T1-02で追加された src/lib/validation の共通バリデーションを注文APIに適用し、
      入力検証を統一する。
      ## 変更内容(What)
      src/api/orders/ の各エンドポイントで、リクエスト検証を共通ユーティリティ経由に
      置き換える。
      ## 完了条件
      - [ ] 不正な入力に対して一貫したエラー応答を返す
      - [ ] 既存のAPIレスポンス形式に変更がない(後方互換)
      - [ ] 各エンドポイントの正常系・異常系テストを tests/ に追加する
      ## やらないこと
      - エンドポイントの追加・削除、レスポンス仕様の変更

  - id: T2-02
    title: "(例)依存のない埋め草タスク: docs整備"
    risk: low
    depends_on: []                    # 独立タスクはT2の空き枠に充填できる
    paths:
      - "docs/**"
    prompt: |
      ## 目的
      README から辿れる開発者向けドキュメントが不足している。
      ## 変更内容
      docs/ 配下にセットアップ手順と主要モジュールの概要を作成する。
      ## 完了条件
      - [ ] リポジトリを初見の開発者が docs だけでローカル起動できる記述になっている
